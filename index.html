<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransPop</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="header">
      <div class="language-selector">
        <span class="lang-tag source-lang">Auto</span>
        <svg class="arrow-icon" viewBox="0 0 24 24" width="16" height="16">
          <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <select id="target-language" class="brand-select">
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="zh">Chinese (Simplified)</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="pt">Portuguese</option>
          <option value="it">Italian</option>
          <option value="ru">Russian</option>
          <option value="hi">Hindi</option>
          <option value="ar">Arabic</option>
        </select>
      </div>
      
      <button id="settings-toggle" class="icon-btn" title="Settings">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <!-- Main Workspace -->
    <main class="main-content">
      <!-- Source Panel -->
      <div class="input-panel">
        <textarea id="source-text" placeholder="Type or select text to translate..."></textarea>
      </div>

      <!-- Divider / Loader -->
      <div class="divider">
        <div id="loader" class="loader hidden"></div>
      </div>

      <!-- Target Panel -->
      <div class="output-panel">
        <div id="translated-container" class="translated-container">
          <div id="translated-text" class="translated-text-content">Translation will appear here...</div>
        </div>
      </div>
    </main>

    <!-- Footer Controls -->
    <footer class="footer">
      <div class="action-group">
        <button id="copy-btn" class="action-btn" title="Copy Translation">
          <svg id="copy-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          <svg id="check-icon" class="hidden" viewBox="0 0 24 24" width="16" height="16" stroke="emerald" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          <span>Copy</span>
        </button>
        <button id="speak-btn" class="action-btn" title="Listen">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          </svg>
          <span>Listen</span>
        </button>
      </div>
      <span class="esc-hint">Esc to close</span>
    </footer>

    <!-- Settings Drawer (Slide-over) -->
    <div id="settings-drawer" class="settings-drawer hidden">
      <div class="settings-header">
        <h3>Settings</h3>
        <button id="settings-close" class="icon-btn">
          <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="settings-body">
        <div class="setting-item">
          <label for="service-provider">Translation Engine</label>
          <select id="service-provider" class="brand-select full-width">
            <option value="google">Google Translate (Free)</option>
            <option value="gemini">Gemini AI (Requires Key)</option>
          </select>
        </div>
        
        <div id="gemini-config" class="setting-item hidden">
          <label for="gemini-key">Gemini API Key</label>
          <input type="password" id="gemini-key" placeholder="Enter AIzaSy... key">
          <div class="input-info">Get key from <a href="https://aistudio.google.com/" target="_blank">Google AI Studio</a></div>
        </div>

        <div class="setting-item">
          <label>Global Shortcut</label>
          <div class="shortcut-display">Option + T (Mac) / Alt + T (Windows)</div>
          <div class="input-info">Highlight text anywhere and press shortcut.</div>
        </div>
      </div>
      <div class="settings-footer">
        <button id="settings-save" class="save-btn">Save Configurations</button>
      </div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
