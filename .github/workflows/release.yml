name: Release OnPopup

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: macos-latest
            node-version: 20
          - os: windows-latest
            node-version: 20
          - os: ubuntu-latest
            node-version: 24

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Linux Build Dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      - name: Install Dependencies
        run: npm ci

      - name: Package Application (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          umask 0022
          npm run make

      - name: Package Application (Non-Linux)
        if: startsWith(matrix.os, 'ubuntu') == false
        run: npm run make

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body_path: release-notes.md
          files: |
            out/make/**/*.dmg
            out/make/**/*.zip
            out/make/**/*.exe
            out/make/**/*.deb
            out/make/**/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
